<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Social Website</title>

<style>
body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#2563eb;
color:white;
padding:15px;
text-align:center;
}

nav{
background:#1e293b;
padding:10px;
text-align:center;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.container{
padding:20px;
max-width:800px;
margin:auto;
}

input,textarea,button{
width:100%;
padding:10px;
margin-top:8px;
}

button{
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

.card{
background:white;
padding:15px;
margin-top:15px;
border-radius:6px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<h2>My Social Website</h2>
</header>

<nav>
<a href="#" onclick="show('home')">Home</a>
<a href="#" onclick="show('profile')">Profile</a>
<a href="#" onclick="show('posts')">Posts</a>
</nav>

<div class="container">

<!-- LOGIN -->
<div id="home">
<h3>Login / Register</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>
<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<!-- PROFILE -->
<div id="profile" class="hidden">

<h3>Your Profile</h3>

<input type="file" id="photo">

<button onclick="savePhoto()">Upload Photo</button>

<br><br>

<img id="profileView" class="profile-img">

<br><br>

<button onclick="logout()">Logout</button>

</div>

<!-- POSTS -->
<div id="posts" class="hidden">

<h3>Create Post</h3>

<textarea id="postText" placeholder="Write something..."></textarea>

<button onclick="addPost()">Post</button>

<div id="postList"></div>

</div>

</div>

<script>

function show(page){

document.getElementById("home").classList.add("hidden")
document.getElementById("profile").classList.add("hidden")
document.getElementById("posts").classList.add("hidden")

document.getElementById(page).classList.remove("hidden")

if(page==="posts"){loadPosts()}
}

function register(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

localStorage.setItem("user",u)
localStorage.setItem("pass",p)

document.getElementById("msg").innerText="Account created"
}

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u===localStorage.getItem("user") &&
p===localStorage.getItem("pass")){

document.getElementById("msg").innerText="Login success"

show("profile")

}else{

document.getElementById("msg").innerText="Wrong login"

}
}

function logout(){

show("home")

}

function savePhoto(){

let file=document.getElementById("photo").files[0]

let reader=new FileReader()

reader.onload=function(){

localStorage.setItem("photo",reader.result)

document.getElementById("profileView").src=reader.result

}

if(file){reader.readAsDataURL(file)}

}

window.onload=function(){

let saved=localStorage.getItem("photo")

if(saved){document.getElementById("profileView").src=saved}

}

function addPost(){

let text=document.getElementById("postText").value

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

posts.push(text)

localStorage.setItem("posts",JSON.stringify(posts))

document.getElementById("postText").value=""

loadPosts()

}

function loadPosts(){

let posts=JSON.parse(localStorage.getItem("posts")||"[]")

let list=document.getElementById("postList")

list.innerHTML=""

posts.reverse().forEach(p=>{

let div=document.createElement("div")

div.className="card"

div.innerText=p

list.appendChild(div)

})

}

</script>

</body>
  </html>
