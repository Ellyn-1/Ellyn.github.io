<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My Full Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f4f4;
        }

        header {
            background: #007bff;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        .container {
            padding: 20px;
        }

        input, button, textarea {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }

        img {
            max-width: 150px;
            border-radius: 50%;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

<header>
    <h2>My Big Website</h2>
</header>

<nav>
    <a href="#" onclick="showHome()">Home</a>
    <a href="#" onclick="showProfile()">Profile</a>
    <a href="#" onclick="showReviews()">Reviews</a>
</nav>

<div class="container">

    <!-- HOME SECTION -->
    <div id="home">
        <h3>Register / Login</h3>
        <input type="text" id="username" placeholder="Enter Username">
        <input type="password" id="password" placeholder="Enter Password">
        <button onclick="register()">Register</button>
        <button onclick="login()">Login</button>
        <p id="message"></p>
    </div>

    <!-- PROFILE SECTION -->
    <div id="profile" class="hidden">
        <h3>Your Profile</h3>
        <input type="file" id="profilePic" accept="image/*">
        <button onclick="saveProfile()">Save Profile Picture</button>
        <br><br>
        <img id="displayPic">
        <br><br>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- REVIEWS SECTION -->
    <div id="reviews" class="hidden">
        <h3>Write Review</h3>
        <textarea id="reviewText" placeholder="Write your review"></textarea>
        <button onclick="addReview()">Submit Review</button>

        <div id="reviewList"></div>
    </div>

</div>

<script>
    function showHome() {
        document.getElementById("home").classList.remove("hidden");
        document.getElementById("profile").classList.add("hidden");
        document.getElementById("reviews").classList.add("hidden");
    }

    function showProfile() {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("profile").classList.remove("hidden");
        document.getElementById("reviews").classList.add("hidden");
    }

    function showReviews() {
        document.getElementById("home").classList.add("hidden");
        document.getElementById("profile").classList.add("hidden");
        document.getElementById("reviews").classList.remove("hidden");
        loadReviews();
    }

    function register() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        localStorage.setItem("user", user);
        localStorage.setItem("pass", pass);

        document.getElementById("message").innerText = "Registered Successfully!";
    }

    function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if(user === localStorage.getItem("user") && pass === localStorage.getItem("pass")){
            document.getElementById("message").innerText = "Login Success!";
            showProfile();
        } else {
            document.getElementById("message").innerText = "Wrong username or password!";
        }
    }

    function saveProfile() {
        let file = document.getElementById("profilePic").files[0];
        let reader = new FileReader();

        reader.onload = function() {
            localStorage.setItem("profilePic", reader.result);
            document.getElementById("displayPic").src = reader.result;
        }

        if(file){
            reader.readAsDataURL(file);
        }
    }

    window.onload = function() {
        let savedPic = localStorage.getItem("profilePic");
        if(savedPic){
            document.getElementById("displayPic").src = savedPic;
        }
    }

    function addReview() {
        let review = document.getElementById("reviewText").value;
        let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
        reviews.push(review);
        localStorage.setItem("reviews", JSON.stringify(reviews));
        document.getElementById("reviewText").value = "";
        loadReviews();
    }

    function loadReviews() {
        let reviews = JSON.parse(localStorage.getItem("reviews")) || [];
        let list = document.getElementById("reviewList");
        list.innerHTML = "";

        reviews.forEach(function(r){
            let div = document.createElement("div");
            div.className = "card";
            div.innerText = r;
            list.appendChild(div);
        });
    }

    function logout() {
        showHome();
    }
</script>

</body>
  </html>
